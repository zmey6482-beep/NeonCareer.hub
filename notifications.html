    <style>
        .notifications-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .notifications-header h2 {
            color: #00F0FF;
            font-size: 28px;
        }
        
        .notifications-actions {
            display: flex;
            gap: 12px;
        }
        
        .notification-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px;
            margin-bottom: 12px;
            background: var(--glass-bg);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .notification-item:hover {
            transform: translateX(4px);
            border-color: rgba(0,240,255,0.3);
        }
        
        .notification-item.unread {
            border-left: 3px solid #00F0FF;
            background: rgba(0,240,255,0.05);
        }
        
        .notification-icon {
            font-size: 28px;
            min-width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,240,255,0.1);
            border-radius: 50%;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-text {
            color: #E0E7FF;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .notification-time {
            color: #8892B0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .notification-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .badge-response { background: #00F0FF; color: #0A0E27; }
        .badge-invitation { background: #B900FF; color: white; }
        .badge-message { background: #00FF88; color: #0A0E27; }
        .badge-info { background: #8892B0; color: #0A0E27; }
        .badge-warning { background: #FF007F; color: white; }
        .badge-success { background: #00FF88; color: #0A0E27; }
        
        .mark-read-btn {
            background: transparent;
            border: 1px solid rgba(0,240,255,0.3);
            color: #8892B0;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mark-read-btn:hover {
            background: #00F0FF;
            color: #0A0E27;
            border-color: #00F0FF;
        }
        
        .empty-notifications {
            text-align: center;
            padding: 80px 20px;
        }
        
        .empty-notifications p:first-child {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .empty-notifications p:last-child {
            color: #8892B0;
            font-size: 18px;
        }
        
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            background: transparent;
            border: 1px solid rgba(0,240,255,0.3);
            color: #8892B0;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-tab.active {
            background: #00F0FF;
            color: #0A0E27;
            border-color: #00F0FF;
        }
        
        .filter-tab:hover:not(.active) {
            border-color: #00F0FF;
            color: #00F0FF;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notification-item {
            animation: slideIn 0.3s ease;
        }
    </style>
</head>

    <div class="container notifications-container">
        <div class="notifications-header">
            <h2>🔔 Уведомления</h2>
            <div class="notifications-actions">
                <button id="markAllReadBtn" class="neon-btn small">✓ Отметить все прочитанными</button>
                <button id="clearAllBtn" class="neon-btn purple small">🗑 Очистить все</button>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">📋 Все</button>
            <button class="filter-tab" data-filter="response">📬 Отклики</button>
            <button class="filter-tab" data-filter="invitation">✉️ Приглашения</button>
            <button class="filter-tab" data-filter="message">💬 Сообщения</button>
            <button class="filter-tab" data-filter="info">ℹ️ Инфо</button>
            <button class="filter-tab" data-filter="unread">🔴 Непрочитанные</button>
        </div>

        <!-- Список уведомлений -->
        <div id="notificationsList">
            <div class="empty-notifications">
                <p>🔔</p>
                <p>Загрузка уведомлений...</p>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>

    <script src="js/main.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
        
        updateNavigation();
        
        let currentFilter = 'all';
        let notifications = [];
        
        function loadNotifications() {
            // Используем функцию из db.js
            notifications = getNotificationsForCurrentUser();
            renderNotifications();
            updateNotificationBadge();
        }
        
        function saveNotifications() {
            // Получаем все уведомления
            const allStored = localStorage.getItem('neoncareer_notifications');
            let allNotifications = allStored ? JSON.parse(allStored) : [];
            
            // Обновляем уведомления текущего пользователя
            const currentUserId = getCurrentUserId();
            const otherNotifications = allNotifications.filter(n => n.userId !== currentUserId);
            const merged = [...otherNotifications, ...notifications];
            
            localStorage.setItem('neoncareer_notifications', JSON.stringify(merged));
            updateNotificationBadge();
        }
        
        function getNotificationTypeInfo(type) {
            const types = {
                'response': { icon: '📬', class: 'badge-response', label: 'Отклик' },
                'invitation': { icon: '✉️', class: 'badge-invitation', label: 'Приглашение' },
                'message': { icon: '💬', class: 'badge-message', label: 'Сообщение' },
                'info': { icon: 'ℹ️', class: 'badge-info', label: 'Информация' },
                'warning': { icon: '⚠️', class: 'badge-warning', label: 'Предупреждение' },
                'success': { icon: '✅', class: 'badge-success', label: 'Успех' }
            };
            return types[type] || { icon: '🔔', class: 'badge-info', label: 'Уведомление' };
        }
        
        function formatNotificationTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'только что';
            if (diffMins < 60) return `${diffMins} мин назад`;
            if (diffHours < 24) return `${diffHours} ч назад`;
            if (diffDays < 7) return `${diffDays} дн назад`;
            return date.toLocaleDateString('ru-RU');
        }
        
        function markAsRead(notificationId) {
            const index = notifications.findIndex(n => n.id === notificationId);
            if (index !== -1 && !notifications[index].read) {
                notifications[index].read = true;
                saveNotifications();
                renderNotifications();
                updateNotificationBadge();
            }
        }
        
        function markAllAsRead() {
            let changed = false;
            notifications.forEach(n => {
                if (!n.read) {
                    n.read = true;
                    changed = true;
                }
            });
            if (changed) {
                saveNotifications();
                renderNotifications();
                updateNotificationBadge();
                showToast('✓ Все уведомления отмечены как прочитанные');
            }
        }
        
        function clearAllNotifications() {
            if (confirm('Вы уверены, что хотите удалить все уведомления?')) {
                notifications = [];
                saveNotifications();
                renderNotifications();
                updateNotificationBadge();
                showToast('🗑 Все уведомления удалены');
            }
        }
        
        function getFilteredNotifications() {
            if (currentFilter === 'all') return notifications;
            if (currentFilter === 'unread') return notifications.filter(n => !n.read);
            return notifications.filter(n => n.type === currentFilter);
        }
        
        function renderNotifications() {
            const container = document.getElementById('notificationsList');
            const filtered = getFilteredNotifications();
            
            if (filtered.length === 0) {
                let emptyMessage = '';
                if (currentFilter === 'all') {
                    emptyMessage = `
                        <div class="empty-notifications">
                            <p>📭</p>
                            <p>У вас пока нет уведомлений</p>
                            <p style="font-size:14px; margin-top:8px;">Когда появятся новые отклики, приглашения или сообщения, они будут отображаться здесь</p>
                        </div>
                    `;
                } else if (currentFilter === 'unread') {
                    emptyMessage = `
                        <div class="empty-notifications">
                            <p>📖</p>
                            <p>Непрочитанных уведомлений нет</p>
                        </div>
                    `;
                } else {
                    emptyMessage = `
                        <div class="empty-notifications">
                            <p>🔍</p>
                            <p>Нет уведомлений этого типа</p>
                        </div>
                    `;
                }
                container.innerHTML = emptyMessage;
                return;
            }
            
            container.innerHTML = filtered.map(notif => {
                const typeInfo = getNotificationTypeInfo(notif.type);
                const timeAgo = formatNotificationTime(notif.created_at);
                const unreadClass = !notif.read ? 'unread' : '';
                
                return `
                    <div class="notification-item ${unreadClass}" data-id="${notif.id}" onclick="markAsRead('${notif.id}')">
                        <div class="notification-icon">
                            ${typeInfo.icon}
                        </div>
                        <div class="notification-content">
                            <div class="notification-text">
                                ${escapeHtml(notif.text)}
                            </div>
                            <div class="notification-time">
                                <span>🕐 ${timeAgo}</span>
                                <span class="notification-badge ${typeInfo.class}">${typeInfo.label}</span>
                                ${!notif.read ? '<span style="color:#00F0FF;">● Новое</span>' : ''}
                            </div>
                        </div>
                        ${!notif.read ? `
                            <button class="mark-read-btn" onclick="event.stopPropagation(); markAsRead('${notif.id}')">
                                ✓ Отметить прочитанным
                            </button>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function setupFilters() {
            const tabs = document.querySelectorAll('.filter-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.dataset.filter;
                    renderNotifications();
                });
            });
        }
        
        function showToast(message) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position: fixed;
                    bottom: 30px;
                    right: 30px;
                    background: linear-gradient(135deg, #00F0FF, #B900FF);
                    color: #0A0E27;
                    padding: 12px 24px;
                    border-radius: 8px;
                    font-weight: bold;
                    z-index: 10001;
                    opacity: 0;
                    transition: opacity 0.3s;
                    box-shadow: 0 0 20px rgba(0,240,255,0.5);
                `;
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadNotifications();
            setupFilters();
            
            document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);
            document.getElementById('clearAllBtn').addEventListener('click', clearAllNotifications);
        });
        
        // Обновление каждые 10 секунд
        setInterval(loadNotifications, 10000);
        
        window.markAsRead = markAsRead;
        window.updateNotificationBadge = updateNotificationBadge;
    </script>
</body>
