<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — NeonCareer hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="glass-card" style="width:100%; max-width:500px;">
            <div class="text-center mb-2">
                <a href="index.html" class="logo" style="font-size:24px;">⚡ NeonCareer hub</a>
            </div>
            <h2 style="font-size:28px; text-align:center; background:linear-gradient(90deg,#00F0FF,#B900FF); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Регистрация</h2>
            <p class="subtitle">Присоединяйся к неоновому сообществу профессионалов</p>

            <div class="message-box" id="msgBox"></div>

            <form id="regForm">
                <!-- Выбор роли -->
                <label style="color:#E0E7FF; display:block; margin-bottom:12px; font-weight:600;">Я хочу:</label>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
                    <div class="dynamic-block text-center clickable" id="roleCandidate" style="border:2px solid #00F0FF;" onclick="selectRole('candidate')">
                        <p style="font-size:36px;">👨‍💻</p>
                        <p style="font-weight:600;">Найти работу</p>
                        <p style="font-size:12px; color:#8892B0;">Я соискатель</p>
                    </div>
                    <div class="dynamic-block text-center clickable" id="roleEmployer" onclick="selectRole('employer')">
                        <p style="font-size:36px;">🏢</p>
                        <p style="font-weight:600;">Найти сотрудников</p>
                        <p style="font-size:12px; color:#8892B0;">Я работодатель</p>
                    </div>
                </div>
                <input type="hidden" id="role" value="candidate">

                <input type="text" id="name" class="neon-input" placeholder="👤 Ваше имя" required>
                <input type="email" id="email" class="neon-input" placeholder="📧 Email" required>
                <input type="password" id="password" class="neon-input" placeholder="🔒 Пароль (минимум 6 символов)" required minlength="6">
                <input type="password" id="confirmPassword" class="neon-input" placeholder="🔒 Подтвердите пароль" required>

                <button type="submit" class="neon-btn w-full">🚀 Зарегистрироваться</button>
            </form>

            <p class="text-center mt-3" style="color:#8892B0;">
                Уже есть аккаунт? <a href="login.html" style="color:#00F0FF;">Войти</a>
            </p>
            <p class="text-center mt-2">
                <a href="index.html" style="color:#8892B0;">← К вакансиям</a>
            </p>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script>
        if (isLoggedIn()) {
            window.location.href = 'index.html';
        }

        function selectRole(role) {
            document.getElementById('role').value = role;
            document.getElementById('roleCandidate').style.border = role === 'candidate' ? '2px solid #00F0FF' :
                '1px solid rgba(255,255,255,0.08)';
            document.getElementById('roleEmployer').style.border = role === 'employer' ? '2px solid #00F0FF' :
                '1px solid rgba(255,255,255,0.08)';
        }

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;

            if (password.length < 6) {
                showMessage('msgBox', 'Пароль должен содержать минимум 6 символов', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showMessage('msgBox', 'Пароли не совпадают', 'error');
                return;
            }

            try {
                register(name, email, password, role);
                window.location.href = 'profile.html';
            } catch (err) {
                showMessage('msgBox', err.message, 'error');
            }
        });
    </script>
</body>
</html>
